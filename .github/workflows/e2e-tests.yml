name: E2E Tests with Allure Report

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  #schedule:
    # Ejecutar pruebas diariamente a las 2 AM UTC
    #- cron: '0 2 * * *'

jobs:
  test:
    name: Run E2E Tests
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [18.x, 20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      
      - name: Set CI env vars
        run: |
          echo "BASE_URL=${{ secrets.BASE_URL || 'http://localhost:3000' }}" >> $GITHUB_ENV
          echo "TEST_USER=${{ secrets.TEST_USER }}" >> $GITHUB_ENV
          echo "TEST_PASSWORD=${{ secrets.TEST_PASSWORD }}" >> $GITHUB_ENV
      
      - name: Run E2E Tests
        run: npm run test
        continue-on-error: true
        env:
          CI: true
          BASE_URL: ${{ env.BASE_URL }}
          TEST_USER: ${{ env.TEST_USER }}
          TEST_PASSWORD: ${{ env.TEST_PASSWORD }}
      
      - name: Generate Allure Report
        if: always()
        run: npm run allure:report
      
      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: allure-results/
          retention-days: 30
      
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: allure-report/
          retention-days: 30
      
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}-node-${{ matrix.node-version }}
          path: test-results/
          retention-days: 30
      
      - name: Comment PR with Results
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const summaryPath = './allure-report/index.html';
            
            let comment = '## 📊 E2E Test Results\n\n';
            comment += `**OS:** ${{ matrix.os }}\n`;
            comment += `**Node:** ${{ matrix.node-version }}\n`;
            comment += `**Status:** ✅ Tests completed\n\n`;
            comment += '[📈 View Allure Report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})';
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  publish-report:
    name: Publish Allure Report
    needs: test
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download Allure Report
        uses: actions/download-artifact@v4
        with:
          name: allure-report-ubuntu-latest-18.x
          path: allure-report/
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-report
          destination_dir: allure-report-${{ github.run_number }}
